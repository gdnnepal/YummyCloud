<html lang="en">
  <head>

  <body>
    <div id="root">
      <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;gap:12px">
        <div style="font-size:40px;animation:bounce-food 1s ease-in-out infinite">🍽️</div>
        <div style="width:40px;height:4px;background:#f3f3f3;border-radius:4px;overflow:hidden">

      </div>
      <style>
        @keyframes bounce-food{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        @keyframes loading-bar{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(100%)}}
      </style>
    </div>
